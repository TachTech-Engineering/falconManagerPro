apiVersion: batch/v1
kind: Job
metadata:
  name: detections-backfill-fixed
  namespace: default
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400  # Clean up after 24 hours
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: backfill
        image: us-central1-docker.pkg.dev/falconmanagerpro/falcon-manager/falcon-api:v92  # Updated version
        command: ["sh", "-lc", "python -u /app/run_backfill.py"]
        envFrom:
        - secretRef:
            name: falcon-db-secret
        env:
        - name: BACKFILL_START_UTC
          value: "2025-12-09T00:00:00Z"
        - name: BACKFILL_END_UTC
          value: "2025-12-12T00:00:00Z"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"